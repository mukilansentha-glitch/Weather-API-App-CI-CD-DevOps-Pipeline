sonar.projectKey=Weather-app
sonar.projectName=Weather-app
sonar.projectVersion=1.0

# Scan everything from root so both app/ and tests/ are found
sonar.sources=.
sonar.language=py
sonar.sourceEncoding=UTF-8

# Coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Wait for quality gate result before pipeline proceeds
sonar.qualitygate.wait=true

# Exclude non-source folders
sonar.exclusions=**/static/**,**/templates/**,**/__pycache__/**,**/htmlcov/**,**/.venv/**,**/node_modules/**

# Tell SonarQube which files are tests (so it counts them separately)
sonar.test.inclusions=tests/**,**/test_*.py,**/*_test.py
